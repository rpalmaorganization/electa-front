name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    name: Build and Deploy Preview
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Install OIDC Client
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get ID Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const core = require('@actions/core')
            return await core.getIDToken()
          result-encoding: string

      - name: Deploy Preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRAVE_FOREST_0DFD77410 }}
          action: "upload"
          app_location: "./app"
          api_location: "./api"
          output_location: "."
          github_id_token: ${{ steps.idtoken.outputs.result }}

  approval_step:
    name: Approve Email Sending
    runs-on: ubuntu-latest
    needs: build_and_preview

    environment:
      name: email-confirmation

    steps:
      - name: Await approval
        run: echo "Waiting for approval to send the email"

  send_email:
    name: Send Notification Email
    runs-on: ubuntu-latest
    needs: approval_step

    steps:
      - name: Call email API
        run: |
          echo "Sending email..."
          curl -X POST https://example.com/send-email
